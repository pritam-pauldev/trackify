<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="./css/signin.css" />
  </head>
  <body>
    <form id="resetForm">
      <div class="form-header">
        <h1 class="form-title">Set New Password</h1>
        <p class="form-subtitle">Choose a strong new password for your account.</p>
      </div>

      <div id="formMessage" class="form-message" role="alert"></div>

      <div class="field-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input id="newPassword" required type="password" placeholder="Min. 4 characters" />
        </div>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input id="confirmPassword" required type="password" placeholder="Repeat new password" />
        </div>
      </div>

      <button id="submitResetBtn" type="submit">Reset Password</button>

      <div class="divider"></div>
      <p class="form-footer">
        Remember your password? <a href="./signin.html">Sign in</a>
      </p>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/reset-password.js"></script>
  </body>
</html>
