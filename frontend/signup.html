<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="./css/signup.css" />
  </head>
  <body>
    <form id="signupForm">

      <div class="form-header">
        <h1 class="form-title">Create an account</h1>
      </div>

      <div id="formMessage" class="form-message" role="alert"></div>

      <div class="field-group">
        <label for="name">Full name</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input id="name" required type="text" placeholder="Pritam Paul" autocomplete="name" />
        </div>
      </div>

      <div class="field-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
          </span>
          <input id="email" required type="email" placeholder="pritam@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="password" required type="password" placeholder="Min. 4 characters" autocomplete="new-password" />
        </div>
      </div>

      <button id="submitSignupBtn" type="submit">Create account</button>

      <div class="divider"></div>
      <p class="form-footer">Already have an account? <a href="/signin.html">Sign in</a></p>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/signup.js"></script>
  </body>
</html>
